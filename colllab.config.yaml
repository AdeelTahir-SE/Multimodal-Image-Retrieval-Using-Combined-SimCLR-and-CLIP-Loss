data:
  batch_size: 32
  max_length: 77
  num_workers: 2
  pairs_json: data/coco_pairs.json
  subset_size: 2000
loss:
  alpha: 0.5
  beta: 0.5
  clip_temperature: 0.07
  simclr_temperature: 0.1
model:
  embedding_dim: 128
  image_backbone: resnet50
  image_pretrained: true
  text_backbone: distilbert-base-uncased
  text_pretrained: true
training:
  checkpoint_dir: checkpoints
  device: cuda
  epochs: 10
  lr: 0.0003
  warmup_epochs: 2
  weight_decay: 0.0001
